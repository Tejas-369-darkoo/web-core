<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beautiful Scenery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #imageContainer {
            width: 100vw;
            height: 100vh;
            cursor: pointer;
        }
        #trackedImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .analytics-notice {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 10px;
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 10;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="imageContainer">
        <img id="trackedImage" src="image.png" alt="Beautiful landscape">
    </div>

    <div class="analytics-notice">This site uses analytics tracking</div>

    <script src="tracker.js"></script>
</body>
</html>
