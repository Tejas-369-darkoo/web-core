<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Web Analytics Dashboard</title>
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.15);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --font-inter: 'Inter', -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-inter);
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 60px;
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.08) 0px, transparent 50%);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* --- HEADER AREA --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .brand-section h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-section h1 span {
            color: var(--primary);
        }

        .brand-section p {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .controls-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .filter-select {
            background-color: rgba(30, 41, 59, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-select:hover {
            border-color: var(--primary);
        }

        .btn-action {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            box-shadow: 0 4px 14px var(--primary-glow);
        }

        .btn-action:hover {
            background-color: #5053e1;
            transform: translateY(-1px);
        }

        .status-badge {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--accent-green);
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.4; }
        }

        /* --- STATS CARDS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, border-color 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.25);
        }

        .stat-card-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-sub);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
        }

        .stat-card-footer {
            font-size: 0.8rem;
            color: var(--text-sub);
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* --- CHARTS GRID --- */
        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 320px;
        }

        /* --- THREE COLUMNS DETAILS --- */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1024px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollable List Items */
        .feed-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Custom Scrollbar */
        .feed-container::-webkit-scrollbar {
            width: 6px;
        }
        .feed-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .feed-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .feed-item {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: background 0.2s;
            border-radius: 8px;
            margin-bottom: 4px;
        }

        .feed-item:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .feed-item:last-child {
            border-bottom: none;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            max-width: 70%;
        }

        .item-title {
            font-weight: 600;
            color: var(--text-main);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .item-meta {
            color: var(--text-sub);
            font-size: 0.75rem;
        }

        .badge {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-load { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .badge-click { background: rgba(99, 102, 241, 0.15); color: var(--primary); }
        .badge-scroll { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
        .badge-exit { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        /* Ranked List */
        .ranked-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
        }
        .ranked-item:last-child {
            border-bottom: none;
        }
        .rank-label {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rank-number {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--primary);
        }
        .rank-text {
            font-weight: 500;
        }
        .rank-value {
            font-weight: 600;
            color: var(--text-main);
        }

        /* --- SESSIONS SECTION --- */
        .sessions-table-wrapper {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.01);
        }

        .session-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-blue) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            color: white;
        }

        .user-type-badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-sub);
        }
        .user-type-badge.new {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
        }

        /* Rotating spinner */
        .spin {
            animation: rotate 1s linear infinite;
        }
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- PROFILES --- */
        .panel-sub {
            font-size: 0.8rem;
            color: var(--text-sub);
        }

        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .profile-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: border-color 0.3s, transform 0.3s;
        }

        .profile-card:hover {
            border-color: rgba(99, 102, 241, 0.25);
            transform: translateY(-2px);
        }

        .profile-head {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .profile-avatar {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent-blue) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
        }

        .profile-id {
            font-weight: 600;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .badge-type {
            align-self: flex-start;
            font-size: 0.68rem;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-sub);
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .badge-type.new {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-green);
        }

        .profile-rows {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .profile-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 0.82rem;
        }
        .profile-row .label { color: var(--text-sub); flex-shrink: 0; }
        .profile-row .value {
            color: var(--text-main);
            font-weight: 500;
            text-align: right;
            word-break: break-all;
        }
        .profile-row .value.mono { font-family: monospace; }

        .profile-stats {
            display: flex;
            gap: 10px;
        }
        .profile-stat {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }
        .profile-stat .num {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .profile-stat .lbl {
            font-size: 0.68rem;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: var(--text-sub);
            padding: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- --- HEADER --- -->
        <header>
            <div class="brand-section">
                <h1>🕵️ SaaS<span>Analytics</span></h1>
                <p>Full-stack web user analytics tracker</p>
            </div>
            
            <div class="controls-section">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>Live Tracking</span>
                </div>
                
                <select class="filter-select" id="dateFilter" onchange="applyFilters()">
                    <option value="all">All Time</option>
                    <option value="today">Today</option>
                    <option value="7days" selected>Last 7 Days</option>
                    <option value="30days">Last 30 Days</option>
                </select>
                
                <button class="btn-action" onclick="reloadData(true)">
                    <span id="refreshIcon">🔄</span>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- --- STATS CARD GRID --- -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-card-title">Total Visits</span>
                <span class="stat-card-value" id="statVisits">0</span>
                <span class="stat-card-footer" id="statVisitsFooter">Total events logged</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-title">Unique Visitors</span>
                <span class="stat-card-value" id="statUnique">0</span>
                <span class="stat-card-footer" id="statUniqueFooter">Distinct browser sessions</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-title">Avg. Time on Page</span>
                <span class="stat-card-value" id="statTime">0s</span>
                <span class="stat-card-footer" id="statTimeFooter">From session exit events</span>
            </div>
            <div class="stat-card">
                <span class="stat-card-title">👥 Active Sessions</span>
                <span class="stat-card-value" id="statSessions">0</span>
                <span class="stat-card-footer" id="statSessionsFooter">Distinct visitor sessions</span>
            </div>
        </div>

        <!-- --- PROFILES --- -->
        <div class="panel" style="margin-bottom: 0;">
            <div class="panel-header">
                <h2 class="panel-title">Profiles</h2>
                <span class="panel-sub" id="profilesCount"></span>
            </div>
            <div class="profiles-grid" id="profilesGrid">
                <div class="empty-state">Loading profiles...</div>
            </div>
        </div>
    </div>

    <script>
        let rawRecent = [];
        let rawSessions = [];

        // Rotation on the manual refresh button
        function startSpin() {
            document.getElementById('refreshIcon').classList.add('spin');
        }
        function stopSpin() {
            document.getElementById('refreshIcon').classList.remove('spin');
        }

        // Fetch live data from the backend APIs
        async function reloadData(isManual = false) {
            if (isManual) startSpin();
            try {
                const [recentRes, sessionsRes] = await Promise.all([
                    fetch('/api/recent'),
                    fetch('/api/sessions')
                ]);

                rawRecent = await recentRes.json();
                rawSessions = await sessionsRes.json();

                renderDashboard();
            } catch (error) {
                console.error("Dashboard loading failed:", error);
            } finally {
                if (isManual) stopSpin();
            }
        }

        function filterLogsByDate(logs, filterType) {
            if (filterType === 'all') return logs;

            const now = new Date();
            let limitDate = new Date();

            if (filterType === 'today') {
                limitDate.setHours(0, 0, 0, 0);
            } else if (filterType === '7days') {
                limitDate.setDate(now.getDate() - 7);
            } else if (filterType === '30days') {
                limitDate.setDate(now.getDate() - 30);
            }

            return logs.filter(log => {
                const ts = log.timestamp || log.startTime;
                return ts && new Date(ts) >= limitDate;
            });
        }

        // Normalise a raw API value, falling back to "Unknown" (never fabricate)
        function cleanValue(v) {
            if (v === undefined || v === null) return 'Unknown';
            const s = String(v).trim();
            if (!s || s === 'IP_UNKNOWN' || s.toLowerCase() === 'unknown') return 'Unknown';
            return s;
        }

        // Keep only the real, known parts of a "City, Country" location string
        function cleanLocation(loc) {
            if (!loc) return 'Unknown';
            const parts = String(loc)
                .split(',')
                .map(p => p.trim())
                .filter(p => p && p.toLowerCase() !== 'unknown');
            return parts.length ? parts.join(', ') : 'Unknown';
        }

        function renderDashboard() {
            const filterType = document.getElementById('dateFilter').value;

            const filteredRecent = filterLogsByDate(rawRecent, filterType);
            const filteredSessions = filterLogsByDate(rawSessions, filterType);

            const totalVisits = filteredRecent.length;
            const uniqueUsers = new Set(filteredRecent.map(l => l.userId)).size;

            let avgTime = 0;
            const exitLogs = filteredRecent.filter(l => l.timeOnPage !== undefined && l.timeOnPage > 0);
            if (exitLogs.length > 0) {
                avgTime = Math.round(exitLogs.reduce((acc, l) => acc + l.timeOnPage, 0) / exitLogs.length);
            }

            document.getElementById('statVisits').textContent = totalVisits;
            document.getElementById('statUnique').textContent = uniqueUsers;
            document.getElementById('statTime').textContent = avgTime + 's';
            document.getElementById('statSessions').textContent = filteredSessions.length;

            renderProfiles(filteredSessions);
        }

        function applyFilters() {
            renderDashboard();
        }

        // Build one profile per visitor (userId) from real session data
        function renderProfiles(sessions) {
            const grid = document.getElementById('profilesGrid');
            const countEl = document.getElementById('profilesCount');

            const profiles = {};
            sessions.forEach(s => {
                const uid = s.userId || 'Unknown';
                if (!profiles[uid]) {
                    profiles[uid] = {
                        userId: uid,
                        userType: s.userType || 'unknown',
                        ip: s.ip,
                        location: s.location,
                        events: 0,
                        visits: 0,
                        lastTime: s.startTime
                    };
                }
                const p = profiles[uid];
                p.events += (s.eventsCount || 0);
                p.visits += 1;
                // Prefer the most recent session's IP / location for this visitor
                if (s.startTime && new Date(s.startTime) >= new Date(p.lastTime || 0)) {
                    p.lastTime = s.startTime;
                    p.ip = s.ip;
                    p.location = s.location;
                    p.userType = s.userType || p.userType;
                }
            });

            const list = Object.values(profiles).sort((a, b) => b.events - a.events);
            countEl.textContent = list.length ? `${list.length} ${list.length === 1 ? 'profile' : 'profiles'}` : '';

            if (list.length === 0) {
                grid.innerHTML = `<div class="empty-state">No profiles yet.</div>`;
                return;
            }

            grid.innerHTML = list.map(p => {
                const ip = cleanValue(p.ip);
                const loc = cleanLocation(p.location);
                const initials = p.userId ? p.userId.replace('user_', '').substring(0, 2).toUpperCase() : 'U';
                const shortId = p.userId.length > 22 ? p.userId.substring(0, 22) + '…' : p.userId;
                const type = (p.userType || 'unknown').toLowerCase();
                return `
                    <div class="profile-card">
                        <div class="profile-head">
                            <div class="profile-avatar">${initials}</div>
                            <div style="display:flex; flex-direction:column; gap:4px; min-width:0;">
                                <span class="profile-id">${shortId}</span>
                                <span class="badge-type ${type}">${type}</span>
                            </div>
                        </div>
                        <div class="profile-rows">
                            <div class="profile-row"><span class="label">IP Address</span><span class="value mono">${ip}</span></div>
                            <div class="profile-row"><span class="label">Approx. Location</span><span class="value">${loc}</span></div>
                        </div>
                        <div class="profile-stats">
                            <div class="profile-stat"><div class="num">${p.visits}</div><div class="lbl">Visits</div></div>
                            <div class="profile-stat"><div class="num">${p.events}</div><div class="lbl">Events</div></div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Init and live refresh cycle
        reloadData();
        setInterval(() => reloadData(false), 5000);

    </script>
</body>
</html>
